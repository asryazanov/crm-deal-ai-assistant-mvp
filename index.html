<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI-Ассистент сделки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
/* CSS: Axoft corporate design system
   Colors: deep navy header, Axoft teal #01696f, cyan accent, neutral work surfaces.
   Typography: Inter, dense but readable B2B hierarchy.
   Spacing: 16/24/32px rhythm, desktop-first with responsive collapse.
   Components: cards, panels, tables, forms, status badges, task modal, filters.
*/
:root {
  --color-bg: #F3F6F8;
  --color-surface: #FFFFFF;
  --color-surface-soft: #F8FBFC;
  --color-border: #DCE6EA;
  --color-border-strong: #B7CDD3;
  --color-text: #0B1628;
  --color-muted: #607080;
  --color-primary: #01696f;
  --color-primary-hover: #00545A;
  --color-navy: #17264A;
  --color-navy-2: #0B1832;
  --color-cyan: #00A9E0;
  --color-teal-soft: #E7F5F5;
  --color-success: #12B76A;
  --color-success-bg: #ECFDF5;
  --color-success-text: #027A48;
  --color-warning: #F79009;
  --color-warning-bg: #FFFAEB;
  --color-warning-text: #B54708;
  --color-danger: #F04438;
  --color-danger-bg: #FEF3F2;
  --color-danger-text: #B42318;
  --radius-card: 14px;
  --radius-button: 8px;
  --shadow-card: 0 10px 30px rgba(23, 38, 74, 0.08), 0 1px 2px rgba(23, 38, 74, 0.06);
  --shadow-strong: 0 22px 46px rgba(11, 24, 50, 0.18);
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background:
    radial-gradient(circle at top left, rgba(0, 169, 224, 0.09), transparent 34%),
    linear-gradient(180deg, #F7FAFB 0%, var(--color-bg) 320px);
  color: var(--color-text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  letter-spacing: 0;
}
button, input { font: inherit; }
button { cursor: pointer; }
.app-header {
  height: 76px;
  background: linear-gradient(90deg, var(--color-navy-2), var(--color-navy));
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 12px 30px rgba(11, 24, 50, 0.22);
}
.header-inner {
  width: min(1440px, calc(100% - 48px));
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto minmax(220px, auto) auto;
  align-items: center;
  gap: 20px;
}
.system-title { display: flex; align-items: center; gap: 18px; min-width: 0; color: #fff; font-size: 18px; font-weight: 700; }
.brand-logo-wrap { display: grid; place-items: center; width: 148px; height: 42px; border-radius: 10px; background: #fff; padding: 8px 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.16); }
.brand-logo { width: 124px; height: auto; display: block; }
.product-name { display: grid; gap: 2px; min-width: 0; }
.product-name span { color: rgba(255,255,255,0.72); font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.product-name strong { color: #fff; font-size: 18px; line-height: 1.15; }
.selected-deal { color: rgba(255,255,255,0.72); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.role-switch { display: inline-flex; gap: 4px; padding: 4px; border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; background: rgba(255,255,255,0.08); }
.role-button { border: 0; border-radius: 999px; background: transparent; color: rgba(255,255,255,0.72); padding: 8px 12px; font-size: 13px; font-weight: 750; white-space: nowrap; }
.role-button.is-active { background: #fff; color: var(--color-navy); }
.primary-button {
  border: 0;
  border-radius: var(--radius-button);
  background: var(--color-primary);
  color: #fff;
  font-weight: 700;
  padding: 12px 16px;
  min-width: 128px;
  transition: background 150ms ease, transform 150ms ease;
  box-shadow: 0 10px 22px rgba(1,105,111,0.28);
}
.primary-button:hover { background: var(--color-primary-hover); }
.primary-button:active { transform: translateY(1px); }
.primary-button .spinner { display: none; width: 14px; height: 14px; border-radius: 999px; border: 2px solid rgba(255,255,255,0.45); border-top-color: #fff; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: -2px; }
.primary-button.is-loading .spinner { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.page { width: min(1440px, calc(100% - 48px)); margin: 32px auto; display: grid; gap: 20px; }
.control-card, .card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-card); box-shadow: var(--shadow-card); }
.control-card { padding: 24px; display: grid; gap: 20px; border-top: 4px solid var(--color-primary); }
.control-top { display: grid; grid-template-columns: minmax(320px, 1fr) auto; gap: 20px; align-items: end; }
.search-box { display: grid; gap: 8px; }
.label, .search-box span { color: var(--color-muted); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.search-box input { border: 1px solid var(--color-border); border-radius: var(--radius-button); padding: 12px 14px; outline: none; color: var(--color-text); background: #fff; }
.search-box input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 4px rgba(1,105,111,0.12); }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { border: 1px solid var(--color-border); border-radius: 999px; background: #fff; color: var(--color-muted); padding: 9px 13px; font-weight: 700; transition: background 150ms ease, border-color 150ms ease, color 150ms ease; }
.chip:hover { background: #F9FAFB; }
.chip.is-active { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-teal-soft); }
.summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
.summary-item { border: 1px solid var(--color-border); border-radius: 12px; padding: 16px; background: var(--color-surface-soft); }
.summary-item span { color: var(--color-muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.summary-item strong { display: block; margin-top: 7px; font-size: 24px; color: var(--color-navy); }
.deal-list { display: grid; gap: 10px; max-height: none; overflow: auto; }
.manager-group { display: grid; gap: 8px; }
.manager-group + .manager-group { margin-top: 12px; padding-top: 12px; border-top: 1px solid #DFD9CF; }
.manager-group-header { display: flex; justify-content: space-between; gap: 10px; align-items: center; color: var(--color-muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
.manager-group-header strong { color: var(--color-navy); font-size: 13px; letter-spacing: 0; text-transform: none; }
.manager-group-header span { color: var(--color-danger-text); }
.deal-row { width: 100%; border: 1px solid var(--color-border); border-radius: 12px; background: #fff; padding: 14px 16px; display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; gap: 12px; text-align: left; transition: background 150ms ease, border-color 150ms ease, transform 150ms ease, box-shadow 150ms ease; }
.deal-row:hover, .deal-row.is-selected { background: #FAFDFD; border-color: var(--color-border-strong); box-shadow: 0 6px 18px rgba(23, 38, 74, 0.08); }
.deal-row-main { min-width: 0; }
.deal-row-main strong, .deal-row-main small { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.deal-row-main small { color: var(--color-muted); margin-top: 2px; }
.deal-row-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.deal-row-meta em { font-style: normal; border-radius: 999px; background: #F4F7F8; color: var(--color-muted); padding: 3px 7px; font-size: 11px; font-weight: 700; }
.deal-row-meta em.danger { background: var(--color-danger-bg); color: var(--color-danger-text); }
.deal-row-score { font-weight: 700; }
.deal-row-score small { display: block; margin-top: 2px; color: var(--color-danger-text); font-size: 11px; font-weight: 800; white-space: nowrap; }
.deal-row-score.green, .metric-number.green { color: var(--color-success-text); }
.deal-row-score.yellow, .metric-number.yellow { color: var(--color-warning-text); }
.deal-row-score.red, .metric-number.red { color: var(--color-danger-text); }
.hero-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
.card { padding: 28px; animation: fadeInUp 0.3s ease forwards; opacity: 0; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.metric-card { min-height: 172px; display: flex; flex-direction: column; justify-content: space-between; }
.metric-number { font-size: 44px; font-weight: 800; margin-top: 16px; letter-spacing: -0.02em; }
.metric-number.compact { font-size: 28px; }
.metric-card p { color: var(--color-muted); margin: 12px 0 0; line-height: 1.45; }
.progress-track { height: 10px; background: #E7EEF1; border-radius: 999px; overflow: hidden; margin-top: 18px; }
.progress-fill { height: 100%; border-radius: inherit; width: 0; transition: width 0.8s ease-out; }
.progress-fill.green { background: var(--color-success); }
.progress-fill.yellow { background: var(--color-warning); }
.progress-fill.red { background: var(--color-danger); }
.health-badge { display: inline-flex; align-items: center; gap: 8px; width: max-content; margin-top: 18px; border-radius: 999px; padding: 8px 11px; font-weight: 700; }
.health-badge.green { color: var(--color-success-text); background: var(--color-success-bg); }
.health-badge.yellow { color: var(--color-warning-text); background: var(--color-warning-bg); }
.health-badge.red { color: var(--color-danger-text); background: var(--color-danger-bg); }
.status-dot, .risk-dot { width: 9px; height: 9px; border-radius: 999px; display: inline-block; flex: 0 0 auto; }
.status-dot.green { background: var(--color-success); }
.status-dot.yellow { background: var(--color-warning); }
.status-dot.red { background: var(--color-danger); }
.context-card { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 24px; border-left: 4px solid var(--color-primary); }
.context-card strong { display: block; margin-top: 8px; font-size: 15px; line-height: 1.35; }
.content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.panel-heading { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 16px; }
.panel-heading h2 { margin: 0; font-size: 18px; font-weight: 750; color: var(--color-navy); }
.panel-heading span { color: var(--color-muted); font-size: 12px; font-weight: 600; }
.risk-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
.risk-item { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 12px; padding: 14px; border-radius: 12px; transition: background 150ms ease; }
.risk-item:hover { background: #F9FAFB; }
.risk-dot.critical { background: var(--color-danger); }
.risk-dot.high { background: var(--color-warning); }
.risk-dot.medium { background: #98A2B3; }
.risk-item strong { display: block; font-weight: 600; }
.risk-item small { display: block; color: var(--color-muted); margin-top: 4px; line-height: 1.45; }
.risk-item.critical { background: var(--color-danger-bg); border: 1px solid rgba(185, 28, 28, 0.18); box-shadow: inset 3px 0 0 var(--color-danger); }
.risk-severity { font-weight: 800; }
.risk-severity.critical { color: var(--color-danger-text); }
.risk-severity.high { color: var(--color-warning-text); }
.risk-severity.medium { color: var(--color-muted); }
.factor-rating-list { display: grid; gap: 12px; }
.factor-rating-row { display: grid; grid-template-columns: minmax(0, 1fr) 48px auto; gap: 12px; align-items: center; }
.factor-rating-row span:first-child { color: var(--color-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.factor-rating-row strong.plus, .weight-row .plus { color: var(--color-success-text); }
.factor-rating-row strong.minus, .weight-row .minus { color: var(--color-danger-text); }
.dot-rating { display: inline-flex; gap: 4px; }
.dot-rating i { width: 8px; height: 8px; border-radius: 999px; background: #EAECF0; }
.dot-rating i.filled { background: var(--color-primary); }
.empty-state { color: var(--color-muted); background: #F9FAFB; border: 1px dashed var(--color-border); border-radius: 10px; padding: 14px; }
.recommendations-card { padding-bottom: 18px; }
.tabs { display: flex; gap: 18px; border-bottom: 1px solid var(--color-border); margin: -4px -4px 18px; padding: 0 4px; }
.tab { border: 0; background: transparent; color: var(--color-muted); font-weight: 600; padding: 0 0 12px; border-bottom: 2px solid transparent; transition: color 150ms ease, border-color 150ms ease; }
.tab:hover, .tab.is-active { color: var(--color-primary); }
.tab.is-active { border-bottom-color: var(--color-primary); }
.tab-panel { display: none; opacity: 0; transition: opacity 200ms ease; }
.tab-panel.is-active { display: block; opacity: 1; }
.recommendation-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
.recommendation-card { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 14px; align-items: start; border: 1px solid var(--color-border); border-radius: 12px; padding: 16px; background: #fff; transition: background 150ms ease, border-color 150ms ease, box-shadow 150ms ease; }
.recommendation-card:hover { background: #FAFDFD; border-color: var(--color-border-strong); box-shadow: 0 8px 18px rgba(23, 38, 74, 0.08); }
.rec-index { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 999px; background: var(--color-teal-soft); color: var(--color-primary); font-weight: 800; font-size: 13px; }
.rec-text { line-height: 1.5; }
.recommendation-toolbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 14px; padding: 14px; border: 1px solid var(--color-border); border-radius: 12px; background: #FAFDFD; }
.recommendation-toolbar strong { display: block; color: var(--color-navy); }
.recommendation-toolbar span { display: block; color: var(--color-muted); font-size: 13px; margin-top: 3px; }
.priority-badge { border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.priority-badge.high { background: var(--color-danger-bg); color: var(--color-danger-text); }
.priority-badge.medium { background: var(--color-warning-bg); color: var(--color-warning-text); }
.task-create-button { border: 1px solid rgba(1,105,111,0.24); border-radius: var(--radius-button); background: var(--color-teal-soft); color: var(--color-primary); font-weight: 800; padding: 8px 12px; white-space: nowrap; transition: background 150ms ease, border-color 150ms ease; }
.task-create-button:hover { background: #D5ECEE; border-color: var(--color-primary); }
.tasks-card { display: grid; gap: 14px; }
.task-list { display: grid; gap: 10px; }
.task-row { border: 1px solid var(--color-border); border-radius: 10px; padding: 14px; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; background: #fff; }
.task-row strong { display: block; margin-bottom: 5px; }
.task-meta { color: var(--color-muted); font-size: 13px; line-height: 1.45; }
.task-checklist { margin: 10px 0 0; padding: 0; list-style: none; display: grid; gap: 6px; color: var(--color-text); }
.task-checklist li { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 8px; align-items: start; font-size: 13px; line-height: 1.35; }
.task-checklist li::before { content: ""; width: 14px; height: 14px; margin-top: 2px; border: 1px solid var(--color-border-strong); border-radius: 4px; background: #fff; }
.task-status-select { border: 1px solid var(--color-border); border-radius: var(--radius-button); padding: 8px 9px; background: #fff; color: var(--color-text); }
.task-empty { color: var(--color-muted); background: #F9FAFB; border: 1px dashed var(--color-border); border-radius: 10px; padding: 14px; }
.modal-backdrop { position: fixed; inset: 0; display: none; place-items: center; background: rgba(16,24,40,0.42); z-index: 50; padding: 20px; }
.modal-backdrop.is-open { display: grid; }
.task-modal { width: min(620px, 100%); background: #fff; border-radius: 16px; box-shadow: var(--shadow-strong); border: 1px solid var(--color-border); overflow: hidden; }
.modal-header { padding: 20px 22px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; gap: 12px; align-items: center; background: linear-gradient(90deg, var(--color-navy-2), var(--color-navy)); color: #fff; }
.modal-header h2 { margin: 0; font-size: 18px; }
.modal-close { border: 0; background: transparent; color: var(--color-muted); font-size: 24px; line-height: 1; }
.task-form { padding: 22px; display: grid; gap: 14px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-field { display: grid; gap: 7px; }
.form-field.full { grid-column: 1 / -1; }
.form-field label { color: var(--color-muted); font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.form-field input, .form-field textarea, .form-field select { width: 100%; border: 1px solid var(--color-border); border-radius: var(--radius-button); padding: 10px 11px; outline: none; color: var(--color-text); background: #fff; }
.form-field textarea { min-height: 92px; resize: vertical; }
.form-field input:focus, .form-field textarea:focus, .form-field select:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
.checklist-preview { margin-top: 2px; padding: 12px; border: 1px solid var(--color-border); border-radius: 12px; background: #F9FAFB; }
.checklist-preview ul { margin: 8px 0 0; padding: 0; list-style: none; display: grid; gap: 8px; }
.checklist-preview li { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 8px; color: var(--color-text); line-height: 1.35; }
.checklist-preview li::before { content: ""; width: 14px; height: 14px; margin-top: 2px; border: 1px solid var(--color-border-strong); border-radius: 4px; background: #fff; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding-top: 4px; }
.secondary-button { border: 1px solid var(--color-border); border-radius: var(--radius-button); background: #fff; color: var(--color-text); font-weight: 600; padding: 10px 14px; }
.toast { position: fixed; right: 24px; bottom: 24px; z-index: 60; background: var(--color-text); color: #fff; border-radius: 10px; padding: 12px 14px; box-shadow: var(--shadow-card); opacity: 0; transform: translateY(8px); pointer-events: none; transition: opacity 180ms ease, transform 180ms ease; }
.toast.is-visible { opacity: 1; transform: translateY(0); }
.methodology summary { cursor: pointer; font-weight: 600; font-size: 16px; }
.methodology-body { margin-top: 16px; color: var(--color-muted); }
.weights-table { display: grid; gap: 1px; border: 1px solid var(--color-border); border-radius: 10px; overflow: hidden; margin-top: 14px; }
.weight-row { display: grid; grid-template-columns: 150px minmax(0, 1fr) 64px; gap: 12px; padding: 10px 12px; background: #fff; color: var(--color-text); align-items: center; }
.weight-row span { color: var(--color-muted); font-size: 12px; }
.weight-row strong { font-weight: 500; }
.weight-row em { font-style: normal; text-align: right; font-weight: 700; }

.workspace-grid { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; align-items: start; }
.main-column { display: grid; gap: 16px; min-width: 0; }
.filter-panel { position: sticky; top: 100px; padding: 24px; display: grid; gap: 20px; max-height: calc(100vh - 124px); overflow: auto; border-top: 4px solid var(--color-primary); }
.filter-panel h2 { margin: 0; font-size: 16px; font-weight: 600; }
.filter-panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.clear-button { border: 0; background: transparent; color: var(--color-primary); font-weight: 600; padding: 0; }
.filter-group { display: grid; gap: 8px; }
.filter-search { width: 100%; border: 1px solid var(--color-border); border-radius: var(--radius-button); padding: 11px 12px; outline: none; }
.filter-search:focus { border-color: var(--color-primary); box-shadow: 0 0 0 4px rgba(1,105,111,0.12); }
.option-list { display: grid; gap: 6px; max-height: 166px; overflow: auto; padding-right: 2px; }
.option-row { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; color: var(--color-text); transition: background 150ms ease; }
.option-row:hover { background: #F9FAFB; }
.option-row input { width: 16px; height: 16px; accent-color: var(--color-primary); }
.option-row span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.option-count { color: var(--color-muted); font-size: 12px; }
.active-filter-summary { color: var(--color-muted); font-size: 13px; line-height: 1.45; padding: 10px 12px; background: #F9FAFB; border: 1px solid var(--color-border); border-radius: 10px; }
.cap-note { color: var(--color-muted); font-size: 12px; margin-top: 8px; line-height: 1.35; }
.deal-list { max-height: 360px; }

@media (max-width: 1020px) {
  .workspace-grid { grid-template-columns: 1fr; }
  .filter-panel { position: static; max-height: none; }
}
@media (max-width: 768px) {
  .header-inner, .page { width: calc(100% - 32px); }
  .header-inner { grid-template-columns: 1fr; gap: 4px; height: auto; padding: 12px 0; }
  .app-header { height: auto; }
  .primary-button { width: 100%; margin-top: 8px; }
  .control-top, .hero-grid, .content-grid, .context-card, .summary-grid { grid-template-columns: 1fr; }
  .page { margin: 16px auto; }
  .card, .control-card { padding: 18px; }
  .weight-row { grid-template-columns: 1fr; }
  .recommendation-card { grid-template-columns: auto minmax(0, 1fr); }
  .priority-badge, .task-create-button { grid-column: 2; width: max-content; }
  .form-grid, .task-row { grid-template-columns: 1fr; }
}

/* CRM workspace redesign: left deal list, compact filter strip, deal-first content */
.crm-layout { display: grid; grid-template-columns: 420px minmax(0, 1fr); gap: 24px; align-items: start; }
.crm-layout.all-deals-mode { grid-template-columns: 1fr; }

.role-note { margin: 10px 0 0; color: var(--color-muted); line-height: 1.45; }
.leader-dashboard { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
.leader-card { border: 1px solid var(--color-border); border-radius: 12px; background: #fff; padding: 16px; }
.leader-card span { display: block; color: var(--color-muted); font-size: 11px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
.leader-card strong { display: block; margin-top: 8px; color: var(--color-navy); font-size: 24px; line-height: 1.1; }
.leader-card small { display: block; margin-top: 7px; color: var(--color-muted); line-height: 1.35; }
.leader-card.danger { background: var(--color-danger-bg); border-color: rgba(185,28,28,0.18); }
.leader-card.danger strong { color: var(--color-danger-text); }
.filter-strip { position: sticky; top: 92px; z-index: 40; display: grid; grid-template-columns: 260px minmax(0, 1fr) max-content; gap: 16px; align-items: center; padding: 14px 16px; border-top: 0; overflow: visible; }
.filter-strip-meta { display: grid; gap: 3px; min-width: 150px; }
.filter-strip-meta strong { color: var(--color-navy); }
.filter-strip-meta span { color: var(--color-muted); font-size: 12px; }
.filter-dropdown-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; min-width: 0; overflow: visible; padding: 0; }
.filter-dropdown { position: relative; z-index: 41; }
.filter-dropdown summary { list-style: none; cursor: pointer; border: 1px solid var(--color-border); border-radius: 999px; padding: 9px 12px; min-width: 128px; max-width: 220px; background: #fff; color: var(--color-text); font-weight: 750; display: flex; justify-content: space-between; gap: 10px; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.filter-dropdown summary::-webkit-details-marker { display: none; }
.filter-dropdown summary:focus { outline: none; }
.filter-dropdown summary:focus-visible { border-color: var(--color-primary); box-shadow: 0 0 0 4px rgba(1,105,111,0.10); }
.filter-dropdown summary::after { content: "⌄"; color: var(--color-primary); font-weight: 900; }
.filter-dropdown[open] summary { border-color: var(--color-primary); box-shadow: 0 0 0 4px rgba(1,105,111,0.10); }
.filter-menu { position: absolute; z-index: 80; top: calc(100% + 8px); left: 0; width: min(300px, calc(100vw - 48px)); padding: 12px; background: #fff; border: 1px solid var(--color-border); border-radius: 14px; box-shadow: var(--shadow-strong); display: grid; gap: 10px; }
.filter-dropdown.align-right .filter-menu { left: auto; right: 0; }
.filter-menu .option-list { max-height: min(240px, calc(100vh - 300px)); overflow: auto; overscroll-behavior: contain; }
.deal-detail-layout { display: grid; grid-template-columns: minmax(0, 1fr); gap: 20px; align-items: start; }
.deal-main-column { display: grid; gap: 20px; min-width: 0; }
.deal-hero-card { padding: 32px; }
.deal-hero { display: grid; grid-template-columns: minmax(0, 1fr) clamp(132px, 14vw, 168px); gap: 28px; align-items: start; }
.deal-kicker { color: var(--color-muted); font-size: 13px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
.deal-title { margin: 8px 0 8px; font-size: clamp(30px, 3vw, 44px); line-height: 1.08; color: var(--color-text); letter-spacing: -0.02em; overflow-wrap: anywhere; }
.deal-subtitle { color: var(--color-muted); font-size: clamp(16px, 1.4vw, 18px); line-height: 1.4; overflow-wrap: anywhere; }
.score-donut { width: clamp(132px, 14vw, 168px); height: clamp(132px, 14vw, 168px); border-radius: 50%; display: grid; place-items: center; background: conic-gradient(var(--score-color) calc(var(--score) * 1%), #E7E2DA 0); justify-self: end; position: relative; }
.score-donut::after { content: ""; position: absolute; inset: 14px; border-radius: 50%; background: #fff; }
.score-donut-inner { position: relative; z-index: 1; display: grid; justify-items: center; gap: 2px; }
.score-donut-value { font-size: clamp(34px, 3.5vw, 42px); font-weight: 900; color: var(--color-text); letter-spacing: -0.03em; }
.score-donut-label { color: var(--color-muted); font-size: 13px; font-weight: 800; }
.deal-badges { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; align-items: center; max-width: 100%; }
.deal-badges .health-badge { margin-top: 0; min-height: 34px; padding: 7px 11px; font-size: 14px; line-height: 1; }
.deal-badges .priority-badge { display: inline-flex; align-items: center; min-height: 34px; padding: 7px 11px; font-size: 13px; line-height: 1; max-width: 100%; }
.deal-detail-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-top: 26px; }
.deal-detail-item { border: 1px solid var(--color-border); border-radius: 12px; padding: 14px; background: #fff; min-height: 88px; min-width: 0; overflow: hidden; }
.deal-detail-item span { display: block; color: var(--color-muted); font-size: 11px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
.deal-detail-item strong { display: block; margin-top: 8px; color: var(--color-text); font-size: clamp(15px, 1.15vw, 17px); line-height: 1.2; overflow-wrap: break-word; hyphens: auto; }
.insight-card { position: sticky; top: 100px; display: grid; gap: 22px; }
.impact-list { border: 1px solid var(--color-border); border-radius: 12px; overflow: hidden; }
.impact-row { display: grid; grid-template-columns: minmax(0, 1fr) 54px; gap: 12px; align-items: center; padding: 13px 16px; border-bottom: 1px solid var(--color-border); }
.impact-row:last-child { border-bottom: 0; }
.impact-row span { color: var(--color-text); line-height: 1.35; }
.impact-row strong { text-align: right; font-size: 18px; }
.impact-row strong.plus { color: var(--color-success-text); }
.impact-row strong.minus { color: var(--color-danger-text); }
.score-explain summary { cursor: pointer; display: flex; justify-content: space-between; gap: 16px; align-items: center; color: var(--color-navy); font-size: 18px; font-weight: 800; }
.score-explain summary::-webkit-details-marker { display: none; }
.score-explain summary::after { content: "⌄"; color: var(--color-primary); font-size: 18px; }
.score-explain[open] summary::after { transform: rotate(180deg); }
.score-explain-body { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-top: 18px; }
.score-explain h3 { margin: 0 0 12px; color: var(--color-text); font-size: 16px; }
.deals-table-card { display: grid; gap: 16px; }
.all-deals-back { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 16px; }
.deals-table-wrap { overflow: visible; border: 1px solid var(--color-border); border-radius: 12px; background: #fff; }
.deals-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.deals-table th, .deals-table td { padding: 10px 9px; border-bottom: 1px solid var(--color-border); text-align: left; vertical-align: middle; font-size: 12px; line-height: 1.25; }
.deals-table th { position: sticky; top: 0; z-index: 1; background: var(--color-surface-soft); color: var(--color-muted); font-size: 11px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
.deals-table td { overflow: hidden; text-overflow: ellipsis; }
.deals-table tr:last-child td { border-bottom: 0; }
.deals-table tbody tr { cursor: pointer; transition: background 150ms ease; }
.deals-table tbody tr:hover, .deals-table tbody tr.is-selected { background: #FAFDFD; }
.deals-table .num-cell { text-align: right; white-space: nowrap; }
.deals-table .tight-cell { width: 64px; text-align: center; }
.deals-table .id-cell { width: 84px; white-space: nowrap; }
.deals-table .client-cell { width: 13%; }
.deals-table .stage-cell { width: 10%; }
.deals-table .money-cell { width: 9%; }
.deals-table .status-cell { width: 8%; }
.table-sort { border: 0; background: transparent; color: inherit; font: inherit; text-transform: inherit; letter-spacing: inherit; padding: 0; }
.table-sort::after { content: "↕"; margin-left: 5px; color: var(--color-primary); font-size: 10px; }
.status-pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 5px 8px; font-size: 12px; font-weight: 800; white-space: nowrap; }
.status-pill.green { background: var(--color-success-bg); color: var(--color-success-text); }
.status-pill.yellow { background: var(--color-warning-bg); color: var(--color-warning-text); }
.status-pill.red { background: var(--color-danger-bg); color: var(--color-danger-text); }
.deal-preview { margin-top: 18px; }
.action-card { display: grid; gap: 16px; }
.action-tabs { display: flex; gap: 18px; border-bottom: 1px solid var(--color-border); }
.action-tabs .tab { padding-bottom: 12px; }
@media (max-width: 1180px) {
  .crm-layout, .deal-detail-layout, .workspace-header, .leader-dashboard { grid-template-columns: 1fr; }

  .app-header { height: auto; }
  .deal-sidebar, .insight-card { position: static; height: auto; max-height: none; }
  .filter-dropdown-row { flex-wrap: wrap; overflow-x: visible; }
}
@media (max-width: 820px) {

  .deals-table { min-width: 1120px; }
  .score-donut { justify-self: start; }
  .filter-menu { position: static; width: 100%; box-shadow: none; margin-top: 8px; }
}

    <!-- HTML: Header -->

      <div class="header-inner">
        <div class="system-title">
          <div class="brand-logo-wrap">
            <img class="brand-logo" src="assets/axoft-logo.png" alt="Axoft">
          </div>
          <div class="product-name">
            <span>Внутренний сервис</span>
            <strong>AI-Ассистент сделки</strong>
          </div>
        </div>
        <div class="role-switch" aria-label="Режим работы">
          <button class="role-button is-active" type="button" data-role="manager">Рабочее место менеджера</button>

          <button class="role-button" type="button" data-role="allDeals">Все сделки</button>

        <div class="selected-deal" id="selectedDealName">Загрузка сделки</div>
        <button class="primary-button" id="recalculateButton"><span class="spinner"></span>Пересчитать</button>
      </div>
    </header>

    <!-- HTML: Deal workspace -->

      <aside class="deal-sidebar" aria-label="Список сделок">
        <div class="sidebar-title">
          <span>Pipeline</span>
          <strong>Сделки</strong>
        </div>
        <label class="search-box">
          <span>Поиск</span>
          <input id="searchInput" type="search" placeholder="ID, клиент, партнер, менеджер">
        </label>
        <div class="filter-row" id="healthFilters">
          <button class="chip is-active" data-health="all">Все</button>
          <button class="chip" data-health="green">Зеленые</button>
          <button class="chip" data-health="yellow">Желтые</button>
          <button class="chip" data-health="red">Красные</button>
        </div>
        <div class="deal-list" id="dealList" aria-label="Список сделок"></div>
      </aside>

      <section class="deal-workspace">
        <div class="workspace-header">
          <div>
            <span class="section-kicker">Локальная демо-версия</span>
            <h1 id="workspaceTitle">Рабочее место менеджера</h1>
            <p class="role-note" id="workspaceNote">Мои сделки, рекомендации и задачи CRM.</p>
          </div>
          <div class="summary-grid" id="summaryGrid"></div>
        </div>
        <section class="leader-dashboard" id="leaderDashboard" hidden></section>

        <section class="filter-strip card" aria-label="Фильтры сделок">
          <div class="filter-strip-meta">
            <strong>Фильтры</strong>
            <span id="activeFilterSummary">Все сделки в выборке</span>
          </div>
          <div class="filter-dropdown-row" id="advancedFilters"></div>
          <button class="clear-button" id="clearFiltersButton">Сбросить</button>
        </section>

        <div id="dealCard"></div>
      </section>
    </main>

    <!-- HTML: Demo CRM task modal -->
    <div class="modal-backdrop" id="taskModal" aria-hidden="true">
      <div class="task-modal" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
        <div class="modal-header">
          <h2 id="taskModalTitle">Создать задачу в CRM</h2>
          <button class="modal-close" id="taskModalClose" type="button" aria-label="Закрыть">×</button>
        </div>
        <form class="task-form" id="taskForm">
          <div class="form-grid">
            <div class="form-field full">
              <label for="taskTitle">Название задачи</label>
              <input id="taskTitle" name="title" required>
            </div>
            <div class="form-field full">
              <label for="taskDescription">Описание</label>
              <textarea id="taskDescription" name="description"></textarea>
            </div>
            <div class="form-field">
              <label for="taskAuthor">Постановщик</label>
              <input id="taskAuthor" name="author" required>
            </div>
            <div class="form-field">
              <label for="taskAssignee">Исполнитель</label>
              <input id="taskAssignee" name="assignee" required>
            </div>
            <div class="form-field">
              <label for="taskDueDate">Срок</label>
              <input id="taskDueDate" name="dueDate" type="date" required>
            </div>
            <div class="form-field">
              <label for="taskPriority">Приоритет</label>
              <select id="taskPriority" name="priority">
                <option>Высокий</option>
                <option>Средний</option>
              </select>
            </div>
            <div class="form-field full">
              <label for="taskDealLink">Связь со сделкой</label>
              <input id="taskDealLink" name="dealLink" readonly>
            </div>
            <div class="form-field full">
              <label>Чек-лист</label>
              <div class="checklist-preview" id="taskChecklistPreview"></div>
            </div>
          </div>
          <div class="modal-actions">
            <button class="secondary-button" type="button" id="taskCancelButton">Отмена</button>
            <button class="primary-button" type="submit">Создать в CRM</button>
          </div>
        </form>
      </div>
    </div>

  style: "currency",

});

const formatNumber = new Intl.NumberFormat("ru-RU");

function yes(value) {
  return String(value || "").trim().toLowerCase() === "да";
}

function number(value) {
  const parsed = Number(value);
  return Number.isFinite(parsed) ? parsed : 0;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function addFactor(factors, name, delta, group) {
  if (delta !== 0) {
    factors.push({ name, delta, group });
  }
}

function addRisk(risks, severity, title, detail) {
  risks.push({ severity, title, detail });
}

function amountWeight(amount) {
  if (amount >= 100000000) return 4;
  if (amount >= 50000000) return 3;
  if (amount >= 5000000) return 1;
  return 0;
}

function marginWeight(margin) {
  if (margin >= 8) return 2;
  if (margin < 6) return -2;
  return 0;
}

function ageWeight(days) {
  if (days > 180) return -8;
  if (days > 120) return -4;
  if (days > 60) return -2;
  return 0;
}

function communicationWeight(days) {
  if (days <= 7) return 6;
  if (days <= 14) return 1;
  if (days <= 21) return -10;
  return -18;
}

function partnerMeetingWeight(days) {
  if (days <= 14) return 3;
  if (days <= 30) return -3;
  return -7;
}

function winRateWeight(rate) {
  if (rate >= 75) return 10;
  if (rate >= 60) return 6;
  if (rate >= 40) return 0;
  if (rate >= 25) return -6;
  return -10;
}

function pairHistoryWeight(rate) {
  if (rate >= 70) return 13;
  if (rate >= 50) return 7;
  if (rate >= 25) return 0;
  if (rate > 0) return -5;
  return -8;
}

function clientHistoryWeight(amountMln) {
  if (amountMln >= 200) return 5;
  if (amountMln >= 50) return 3;
  return 0;
}

  const factors = [];
  const risks = [];

  const stage = deal[FIELD.stage];

  const segmentDelta = segmentWeights[deal[FIELD.segment]] ?? 0;
  addFactor(factors, `Сегмент клиента: ${deal[FIELD.segment]}`, segmentDelta, "Основные параметры");

  const amount = number(deal[FIELD.amount]);
  const amountDelta = amountWeight(amount);
  addFactor(factors, `Сумма сделки: ${formatRub.format(amount)}`, amountDelta, "Основные параметры");

  const marginDelta = marginWeight(number(deal[FIELD.marginPercent]));
  addFactor(factors, `Маржа: ${deal[FIELD.marginPercent]}%`, marginDelta, "Основные параметры");

  const ageDays = number(deal[FIELD.ageDays]);
  const ageDelta = ageWeight(ageDays);

  if (ageDays > 180) addRisk(risks, "high", "Сделка слишком долго в воронке", `Возраст сделки ${ageDays} дней. Нужна проверка актуальности и следующего шага.`);

  const vendorProtectionDelta = yes(deal[FIELD.vendorProtection]) ? 8 : -8;
  addFactor(factors, "Регистрация у вендора", vendorProtectionDelta, "Основные параметры");
  if (!yes(deal[FIELD.vendorProtection])) addRisk(risks, "high", "Нет защиты сделки у вендора", "Сделка не зарегистрирована у вендора, ниже шанс на эксклюзивную поддержку и спецусловия.");

  const pilotDelta = yes(deal[FIELD.pilot]) ? 15 : -6;
  addFactor(factors, "Пилотный проект", pilotDelta, "Основные параметры");
  if (!yes(deal[FIELD.pilot])) addRisk(risks, "medium", "Нет пилота", "Для сложной или крупной сделки пилот снижает технические и закупочные риски.");

  const presaleDelta = yes(deal[FIELD.presaleRequest]) ? 7 : -5;
  addFactor(factors, "Заявка на пресейл", presaleDelta, "Основные параметры");
  if (!yes(deal[FIELD.presaleRequest])) addRisk(risks, "medium", "Нет заявки на пресейл", "Техническая проработка не подтверждена в CRM.");

  const decisionMakerDelta = yes(deal[FIELD.decisionMaker]) ? 12 : -16;
  addFactor(factors, "Контакт ЛПР", decisionMakerDelta, "Качество проработки");
  if (!yes(deal[FIELD.decisionMaker])) addRisk(risks, "critical", "Не зафиксирован ЛПР", "В карточке сделки нет контакта лица, принимающего решение.");

  const budget = deal[FIELD.budget];
  const budgetDelta = budget === "Документ" ? 12 : budget === "Устное" ? 5 : -14;
  addFactor(factors, `Бюджет: ${budget}`, budgetDelta, "Качество проработки");
  if (budget === "Нет") addRisk(risks, "critical", "Бюджет не подтвержден", "Нет подтверждения бюджета клиента.");

  const silenceDays = number(deal[FIELD.silenceDays]);
  const silenceDelta = communicationWeight(silenceDays);
  addFactor(factors, `Ритм коммуникаций: ${silenceDays} дн.`, silenceDelta, "Качество проработки");
  if (silenceDays > 21) addRisk(risks, "critical", "Критически нарушен ритм коммуникаций", `${silenceDays} дней без обновлений по сделке.`);
  else if (silenceDays > 14) addRisk(risks, "high", "Нарушен ритм коммуникаций", `${silenceDays} дней без обновлений по сделке.`);

  const confidenceDelta = yes(deal[FIELD.managerConfidence]) ? 6 : -5;
  addFactor(factors, "Уверенность менеджера", confidenceDelta, "Качество проработки");

  const partnerMeetingDays = number(deal[FIELD.partnerMeetingDays]);
  const partnerMeetingDelta = partnerMeetingWeight(partnerMeetingDays);
  addFactor(factors, `Встреча с партнером: ${partnerMeetingDays} дн.`, partnerMeetingDelta, "Качество проработки");
  if (partnerMeetingDays > 30) addRisk(risks, "medium", "Давно не было встречи с партнером", `Последняя встреча была ${partnerMeetingDays} дней назад.`);

  const partnerWinRate = number(deal[FIELD.partnerWinRate]);
  const winRateDelta = winRateWeight(partnerWinRate);
  addFactor(factors, `Win rate партнера: ${partnerWinRate}%`, winRateDelta, "Партнер");
  if (partnerWinRate < 40) addRisk(risks, "high", "Слабая историческая результативность партнера", `Win rate партнера ${partnerWinRate}%.`);

  const partnerRole = deal[FIELD.partnerRole];
  const partnerRoleDelta = partnerRole === "Активный" ? 5 : partnerRole === "Генерация Axoft" ? 2 : -5;
  addFactor(factors, `Роль партнера: ${partnerRole}`, partnerRoleDelta, "Партнер");
  if (partnerRole === "Цена") addRisk(risks, "medium", "Роль партнера сведена к цене", "Партнер может не вести активную работу с клиентом.");

  const partnerContactDelta = yes(deal[FIELD.partnerContact]) ? 2 : -4;
  addFactor(factors, "Контакт партнера", partnerContactDelta, "Партнер");
  if (!yes(deal[FIELD.partnerContact])) addRisk(risks, "medium", "Не заполнен контакт партнера", "Нет базового контактного лица со стороны партнера.");

  const bdmDelta = yes(deal[FIELD.bdm]) ? 9 : -8;
  addFactor(factors, "BDM в команде", bdmDelta, "Команда Axoft");
  if (!yes(deal[FIELD.bdm])) addRisk(risks, "high", "Нет BDM в команде", "Нет поддержки вендорского направления и стратегической проработки.");

  const engineerDelta = yes(deal[FIELD.engineer]) ? 8 : -7;
  addFactor(factors, "Инженер / Presale", engineerDelta, "Команда Axoft");
  if (!yes(deal[FIELD.engineer])) addRisk(risks, "high", "Нет инженера / presale", "Техническая проработка сделки не подтверждена участником команды.");

  const teamCount = number(deal[FIELD.teamCount]);
  const teamDelta = teamCount >= 4 ? 4 : teamCount === 3 ? 2 : teamCount === 1 ? -4 : 0;
  addFactor(factors, `Команда сделки: ${teamCount} участн.`, teamDelta, "Команда Axoft");

  const pairHistory = number(deal[FIELD.pairHistory]);
  const pairHistoryDelta = pairHistoryWeight(pairHistory);
  addFactor(factors, `История партнер-клиент: ${pairHistory}%`, pairHistoryDelta, "Клиент и история");
  if (pairHistory < 25) addRisk(risks, "high", "Слабая история связки партнер-клиент", `История успешных сделок связки ${pairHistory}%.`);

  const newClientDelta = yes(deal[FIELD.newClient]) ? -2 : 0;
  addFactor(factors, "Новый клиент", newClientDelta, "Клиент и история");

  const clientHistoryDelta = clientHistoryWeight(number(deal[FIELD.clientHistory]));
  addFactor(factors, `История клиента с Axoft: ${deal[FIELD.clientHistory]} млн руб.`, clientHistoryDelta, "Клиент и история");

  score += factors.reduce((sum, factor) => sum + factor.delta, 0);
  const rawProbability = Math.round(clamp(score, 5, 95));
  const criticalCount = risks.filter((risk) => risk.severity === "critical").length;
  const highCount = risks.filter((risk) => risk.severity === "high").length;
  const cap = getProbabilityCap(criticalCount, highCount);
  const probability = Math.min(rawProbability, cap);
  const health = getHealth(probability, criticalCount, highCount);
  const priority = probability >= 70 ? "Высокий" : probability >= 45 ? "Средний" : "Низкий";

  return {
    deal,
    probability,
    rawProbability,
    probabilityCap: cap,
    priority,
    health,
    risks,
    factors,
    managerActions: buildManagerActions(deal, risks),
    leaderActions: buildLeaderActions(deal, risks, probability)
  };
}

function getProbabilityCap(criticalCount, highCount) {
  let cap = 95;
  if (criticalCount >= 2) cap = Math.min(cap, 45);
  else if (criticalCount === 1) cap = Math.min(cap, 70);
  if (highCount >= 3) cap = Math.min(cap, 60);
  return cap;
}

function getHealth(probability, criticalCount, highCount) {
  if (probability < 45 || criticalCount >= 2 || highCount >= 3) return "red";
  if (probability >= 70 && criticalCount === 0 && highCount <= 1) return "green";
  return "yellow";
}

function buildManagerActions(deal, risks) {
  const actions = [];
  const hasRisk = (title) => risks.some((risk) => risk.title === title);

  if (hasRisk("Критически нарушен ритм коммуникаций") || hasRisk("Нарушен ритм коммуникаций")) {
    actions.push("Сегодня обновить текущую ситуацию по проекту и зафиксировать следующий контакт с партнером или клиентом.");
  }
  if (hasRisk("Не зафиксирован ЛПР")) {
    actions.push("Попросить партнера подтвердить ЛПР клиента и внести контакт с ролью в CRM.");
  }
  if (hasRisk("Бюджет не подтвержден")) {
    actions.push("Уточнить статус бюджета: сумма, источник финансирования, срок и формат подтверждения.");
  }
  if (hasRisk("Нет инженера / presale")) {
    actions.push("Подключить инженера / presale и согласовать технический следующий шаг.");
  }
  if (hasRisk("Нет защиты сделки у вендора")) {
    actions.push("Проверить возможность регистрации сделки у вендора и подготовить данные для защиты.");
  }
  if (hasRisk("Нет пилота")) {
    actions.push("Оценить необходимость пилота и предложить клиенту короткий сценарий проверки решения.");
  }
  if (hasRisk("Давно не было встречи с партнером")) {
    actions.push("Назначить встречу с партнером и сверить план выхода на клиента.");
  }
  if (actions.length === 0) {
    actions.push("Поддерживать текущий темп, обновлять CRM после каждого значимого контакта и зафиксировать следующий шаг.");
  }
  return actions;
}

function buildLeaderActions(deal, risks, probability) {
  const actions = [];
  const highValue = number(deal[FIELD.amount]) >= 50000000;
  const criticalCount = risks.filter((risk) => risk.severity === "critical").length;

  if (!yes(deal[FIELD.bdm])) {
    actions.push("Назначить BDM или подтвердить, что сделка не требует вендорской поддержки.");
  }
  if (probability < 45 || criticalCount > 0) {
    actions.push("Провести короткий разбор сделки с менеджером: ЛПР, бюджет, следующий контакт, роль партнера.");
  }
  if (highValue && risks.length > 0) {
    actions.push("Взять сделку в управленческий контроль до снятия ключевых рисков.");
  }
  if (number(deal[FIELD.partnerWinRate]) < 40 || number(deal[FIELD.pairHistory]) < 25) {
    actions.push("Проверить, есть ли в экосистеме партнер с более сильной историей по этому клиенту или отрасли.");
  }
  if (!yes(deal[FIELD.engineer])) {
    actions.push("Согласовать доступность технического ресурса, если сделка находится в Presale, КП, переговорах или закрытии.");
  }
  if (actions.length === 0) {
    actions.push("Сделка выглядит управляемой. Контроль оставить на регулярном pipeline review.");
  }
  return actions;
}

}

function getRoleBaseDeals() {
  if (state.role === "manager") {
    return state.scored.filter((item) => item.deal[FIELD.manager] === state.currentManager);
  }
  return state.scored;
}

function probabilityInRange(value, rangeId) {
  return {
    low: value < 45,
    mid: value >= 45 && value < 70,
    high: value >= 70
  }[rangeId] || false;
}

function criticalInRange(count, rangeId) {
  return {
    none: count === 0,
    one: count === 1,
    many: count >= 2
  }[rangeId] || false;
}

function getVisibleDeals() {
  const query = state.search.trim().toLowerCase();
  return getRoleBaseDeals().filter((item) => {
    const deal = item.deal;
    if (state.health !== "all" && item.health !== state.health) return false;
    if (state.filters.partner.size && !state.filters.partner.has(deal[FIELD.partner])) return false;
    if (state.filters.client.size && !state.filters.client.has(deal[FIELD.client])) return false;
    if (state.filters.manager.size && !state.filters.manager.has(deal[FIELD.manager])) return false;
    if (state.filters.amount.size && ![...state.filters.amount].some((range) => amountInRange(number(deal[FIELD.amount]), range))) return false;
    if (state.filters.stage.size && !state.filters.stage.has(deal[FIELD.stage])) return false;
    if (state.filters.probability.size && ![...state.filters.probability].some((range) => probabilityInRange(item.probability, range))) return false;
    const critical = item.risks.filter((risk) => risk.severity === "critical").length;
    if (state.filters.critical.size && ![...state.filters.critical].some((range) => criticalInRange(critical, range))) return false;
    if (!query) return true;
    return [
      deal[FIELD.id],
      deal[FIELD.client],
      deal[FIELD.partner],
      deal[FIELD.manager],
      deal[FIELD.vendor],
      deal[FIELD.product]
    ].some((value) => String(value || "").toLowerCase().includes(query));
  });
}

function renderSummary() {
  const visible = getVisibleDeals();
  const total = visible.length;
  const avg = total ? Math.round(visible.reduce((sum, item) => sum + item.probability, 0) / total) : 0;
  const red = visible.filter((item) => item.health === "red").length;
  const green = visible.filter((item) => item.health === "green").length;
  const critical = visible.reduce((sum, item) => sum + item.risks.filter((risk) => risk.severity === "critical").length, 0);
  const riskAmount = visible.filter((item) => item.health === "red").reduce((sum, item) => sum + number(item.deal[FIELD.amount]), 0);
  const summary = state.role === "leader"
    ? [
      ["Сделок команды", formatNumber.format(total)],
      ["Средняя вероятность", `${avg}%`],
      ["Красные", formatNumber.format(red)],
      ["Сумма под риском", formatRub.format(riskAmount)]
    ]
    : [
      ["Моих сделок", formatNumber.format(total)],
    ["Средняя вероятность", `${avg}%`],
    ["Здоровые", formatNumber.format(green)],
      ["Крит. риски", formatNumber.format(critical)]

  document.getElementById("summaryGrid").innerHTML = summary.map(([label, value]) => `

function renderDealRow(item) {

function renderGroupedDealList(items) {
  const managers = [...new Set(items.map((item) => item.deal[FIELD.manager]))].sort();
  return managers.map((manager) => {
    const deals = items.filter((item) => item.deal[FIELD.manager] === manager);
    const critical = deals.reduce((sum, item) => sum + item.risks.filter((risk) => risk.severity === "critical").length, 0);
    return `<section class="manager-group">
      <div class="manager-group-header"><strong>${manager}</strong><span>${deals.length} сделок · ${critical} крит.</span></div>
      ${deals.map((item) => renderDealRow(item)).join("")}
    </section>`;
  }).join("");
}

function getSortedDeals(items) {
  if (state.tableSort.key === "default") return getDefaultSortedDeals(items);
  const direction = state.tableSort.direction === "asc" ? 1 : -1;
  const value = (item) => {
    const deal = item.deal;
    const critical = item.risks.filter((risk) => risk.severity === "critical").length;
    const healthOrder = { red: 0, yellow: 1, green: 2 };
    return {
      id: deal[FIELD.id],
      client: deal[FIELD.client],
      partner: deal[FIELD.partner],
      manager: deal[FIELD.manager],
      stage: deal[FIELD.stage],
      amount: number(deal[FIELD.amount]),
      probability: item.probability,
      health: healthOrder[item.health] ?? 9,
      risks: item.risks.length,
      critical,
      silence: number(deal[FIELD.silenceDays])
    }[state.tableSort.key];
  };
  return [...items].sort((a, b) => {
    const av = value(a);
    const bv = value(b);
    if (typeof av === "number" && typeof bv === "number") return (av - bv) * direction;
    return String(av || "").localeCompare(String(bv || ""), "ru") * direction;
  });
}

function getDefaultSortedDeals(items) {
  const healthOrder = { red: 0, yellow: 1, green: 2 };
  return [...items].sort((a, b) => {
    const healthDelta = (healthOrder[a.health] ?? 9) - (healthOrder[b.health] ?? 9);
    if (healthDelta) return healthDelta;
    const criticalDelta = b.risks.filter((risk) => risk.severity === "critical").length - a.risks.filter((risk) => risk.severity === "critical").length;
    if (criticalDelta) return criticalDelta;
    return number(b.deal[FIELD.amount]) - number(a.deal[FIELD.amount]);
  });
}

function renderRisks(risks) {
  if (risks.length === 0) return `<div class="empty-state">Критичных рисков не найдено. Сделку стоит поддерживать в текущем ритме.</div>`;
  return `<ul class="risk-list">${sortRisksBySeverity(risks).map((risk) => `<li class="risk-item ${risk.severity}"><span class="risk-dot ${risk.severity}"></span><span><strong>${risk.title}</strong><small><span class="risk-severity ${risk.severity}">${riskSeverityLabel(risk.severity)}</span> · ${risk.detail}</small></span></li>`).join("")}</ul>`;
}

function sortRisksBySeverity(risks) {
  const order = { critical: 0, high: 1, medium: 2 };
  return [...risks].sort((a, b) => (order[a.severity] ?? 9) - (order[b.severity] ?? 9));
}

function renderInsights(selected) { return selected; }

function renderFactorRatings(selected) {
  const ranked = [...selected.factors].sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta)).slice(0, 8);
  return `<div class="factor-rating-list">${ranked.map((factor) => {
    const score = Math.max(1, Math.min(5, Math.ceil(Math.abs(factor.delta) / 4)));
    return `<div class="factor-rating-row"><span>${factor.name}</span><strong class="${factor.delta > 0 ? "plus" : "minus"}">${factor.delta > 0 ? "+" : ""}${factor.delta}</strong><span class="dot-rating">${Array.from({ length: 5 }, (_, index) => `<i class="${index < score ? "filled" : ""}"></i>`).join("")}</span></div>`;
  }).join("")}</div>`;
}


function detailTile(label, value) {
  return `<div class="deal-detail-item"><span>${label}</span><strong>${value || "Не указано"}</strong></div>`;
}

function renderFactorImpact(selected, mode) {
  const factors = selected.factors
    .filter((factor) => mode === "positive" ? factor.delta > 0 : factor.delta < 0)
    .sort((a, b) => mode === "positive" ? b.delta - a.delta : a.delta - b.delta)
    .slice(0, 7);
  if (!factors.length) return `<div class="empty-state">Нет выраженных факторов.</div>`;
  return `<div class="impact-list">${factors.map((factor) => `<div class="impact-row"><span>${factor.name}</span><strong class="${factor.delta > 0 ? "plus" : "minus"}">${factor.delta > 0 ? "+" : ""}${factor.delta}</strong></div>`).join("")}</div>`;
}

function renderRecommendationCards(actions, risks, role) {
  const hasCritical = risks.some((risk) => risk.severity === "critical");
  const roleLabel = role === "leader" ? "руководителя" : "менеджера";
  const taskPriority = hasCritical ? "Высокий" : "Средний";
  return `
    <div class="recommendation-toolbar">
      <div>
        <strong>Единая задача с чек-листом</strong>
        <span>${actions.length} пунктов для ${roleLabel} будут добавлены в задачу CRM.</span>
      </div>
      <button class="task-create-button" data-task-role="${role}" data-task-priority="${taskPriority}">Поставить задачу в CRM</button>
    </div>
    <ol class="recommendation-list">${actions.map((action, index) => {
    const priority = hasCritical || index === 0 ? "Высокий" : "Средний";
    return `<li class="recommendation-card"><span class="rec-index">${index + 1}</span><span class="rec-text">${action}</span><span class="priority-badge ${priority === "Высокий" ? "high" : "medium"}">${priority}</span></li>`;
  }).join("")}</ol>`;
}

function renderWeightsTable(factors) {
  return factors.map((factor) => `<div class="weight-row"><span>${factor.group}</span><strong>${factor.name}</strong><em class="${factor.delta > 0 ? "plus" : "minus"}">${factor.delta > 0 ? "+" : ""}${factor.delta}</em></div>`).join("");
}

function getSelectedScoredDeal() {
  return state.scored.find((item) => item.deal[FIELD.id] === state.selectedId) || state.scored[0];
}

function loadTasks() {
  try {
    return JSON.parse(localStorage.getItem("crmAssistantTasks") || "[]");
  } catch {
    return [];
  }
}

function saveTasks() {
  localStorage.setItem("crmAssistantTasks", JSON.stringify(state.tasks));
}

function getTasksForDeal(dealId) {
  return state.tasks.filter((task) => {
    if (task.dealId !== dealId) return false;
    if (state.role === "manager") return task.assignee === state.currentManager;
    return true;
  });
}

function defaultDueDate(priority) {
  const date = new Date();
  date.setDate(date.getDate() + (priority === "Высокий" ? 1 : 3));
  return date.toISOString().slice(0, 10);
}

function actionsForRole(selected, role) {
  return role === "leader" ? selected.leaderActions : selected.managerActions;
}

function openTaskModal({ role, priority }) {
  const selected = getSelectedScoredDeal();
  if (!selected) return;
  const deal = selected.deal;
  const isLeader = role === "leader";
  const checklist = actionsForRole(selected, role);
  const title = isLeader ? "План контроля рисков по сделке" : "План действий по рискам сделки";
  state.taskDraft = { role, dealId: deal[FIELD.id], checklist };
  document.getElementById("taskTitle").value = title;
  document.getElementById("taskDescription").value = `${title}: ${deal[FIELD.client]}`;
  document.getElementById("taskAuthor").value = isLeader ? "Руководитель продаж" : deal[FIELD.manager];
  document.getElementById("taskAssignee").value = deal[FIELD.manager];
  document.getElementById("taskDueDate").value = defaultDueDate(priority);
  document.getElementById("taskPriority").value = priority;
  document.getElementById("taskDealLink").value = `${deal[FIELD.id]} · ${deal[FIELD.client]}`;
  document.getElementById("taskChecklistPreview").innerHTML = renderChecklistPreview(checklist);
  document.getElementById("taskModal").classList.add("is-open");
  document.getElementById("taskModal").setAttribute("aria-hidden", "false");
  document.getElementById("taskTitle").focus();
}

function renderChecklistPreview(checklist) {
  if (!checklist.length) return `<span class="muted">Нет пунктов чек-листа.</span>`;
  return `<strong>${checklist.length} пунктов</strong><ul>${checklist.map((item) => `<li>${item}</li>`).join("")}</ul>`;
}

function closeTaskModal() {
  document.getElementById("taskModal").classList.remove("is-open");
  document.getElementById("taskModal").setAttribute("aria-hidden", "true");
  state.taskDraft = null;
}

function createTaskFromForm(event) {
  event.preventDefault();
  const selected = getSelectedScoredDeal();
  if (!selected || !state.taskDraft) return;
  const deal = selected.deal;
  const task = {
    id: `CRM-TASK-${String(Date.now()).slice(-6)}`,
    dealId: deal[FIELD.id],
    dealName: deal[FIELD.client],
    title: document.getElementById("taskTitle").value.trim(),
    description: document.getElementById("taskDescription").value.trim(),
    author: document.getElementById("taskAuthor").value.trim(),
    assignee: document.getElementById("taskAssignee").value.trim(),
    dueDate: document.getElementById("taskDueDate").value,
    priority: document.getElementById("taskPriority").value,
    checklist: state.taskDraft.checklist || [],
    status: "Новая",
    createdAt: new Date().toISOString()
  };
  state.tasks.unshift(task);
  saveTasks();
  closeTaskModal();
  render();
  showToast(`Задача ${task.id} создана в CRM`);
}

function renderCrmTasks(dealId) {
  const tasks = getTasksForDeal(dealId);
  if (!tasks.length) {
    return `<div class="task-empty">Созданных задач по этой сделке пока нет. Нажмите “Поставить задачу в CRM” на вкладке рекомендаций.</div>`;
  }
  return `<div class="task-list">${tasks.map((task) => `
    <article class="task-row">
      <div>
        <strong>${task.title}</strong>
        <div class="task-meta">${task.id} · ${task.assignee} · срок ${formatDate(task.dueDate)} · ${task.priority}</div>
        ${task.checklist?.length ? `<ul class="task-checklist">${task.checklist.map((item) => `<li>${item}</li>`).join("")}</ul>` : ""}
      </div>
      <select class="task-status-select" data-task-id="${task.id}" aria-label="Статус задачи ${task.id}">
        ${["Новая", "В работе", "Выполнена"].map((status) => `<option ${task.status === status ? "selected" : ""}>${status}</option>`).join("")}
      </select>
    </article>
  `).join("")}</div>`;
}

function formatDate(value) {
  if (!value) return "не задан";
  const [year, month, day] = value.split("-");
  return `${day}.${month}.${year}`;
}

function wireRecommendationButtons() {
  document.querySelectorAll("[data-task-role]").forEach((button) => {
    button.addEventListener("click", () => {
      openTaskModal({
        role: button.dataset.taskRole,
        priority: button.dataset.taskPriority
      });
    });
  });
}

function wireTaskStatusControls() {
  document.querySelectorAll("[data-task-id]").forEach((select) => {
    select.addEventListener("change", () => {
      const task = state.tasks.find((item) => item.id === select.dataset.taskId);
      if (!task) return;
      task.status = select.value;
      saveTasks();
      showToast(`Статус ${task.id}: ${task.status}`);
      render();
    });
  });
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("is-visible");
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove("is-visible"), 2400);
}

function wireTabs() {
  document.querySelectorAll(".tab").forEach((tab) => tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach((item) => item.classList.remove("is-active"));
    document.querySelectorAll(".tab-panel").forEach((item) => item.classList.remove("is-active"));
    tab.classList.add("is-active");
    document.getElementById(`${tab.dataset.tab}Panel`).classList.add("is-active");
  }));
}

function animateMetrics() {
  requestAnimationFrame(() => document.querySelectorAll(".progress-fill").forEach((bar) => { bar.style.width = bar.dataset.width; }));
  document.querySelectorAll("[data-count-target]").forEach((node) => {
    const target = Number(node.dataset.countTarget);
    const start = performance.now();
    const duration = 600;
    const tick = (now) => {
      const progress = Math.min(1, (now - start) / duration);
      node.textContent = `${Math.round(target * progress)}%`;
      if (progress < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

function renderRoleChrome() {
  document.querySelectorAll("[data-role]").forEach((button) => {
    button.classList.toggle("is-active", button.dataset.role === state.role);
  });
  const isLeader = state.role === "leader";
  const isAllDeals = state.role === "allDeals";
  document.querySelector(".crm-layout").classList.toggle("all-deals-mode", isAllDeals);
  document.getElementById("workspaceTitle").textContent = isAllDeals ? "Все сделки" : isLeader ? "Панель руководителя" : "Рабочее место менеджера";
  document.getElementById("workspaceNote").textContent = isAllDeals
    ? "Реестр всех сделок команды с фильтрами, сортировкой и открытием карточки."
    : isLeader
      ? "Командная воронка, критические сделки, управленческие задачи менеджерам."
      : `${state.currentManager}: мои сделки, рекомендации и задачи CRM.`;
  document.querySelector(".sidebar-title span").textContent = isLeader ? "Team pipeline" : "My pipeline";
  document.querySelector(".sidebar-title strong").textContent = isLeader ? "Сделки по менеджерам" : "Мои сделки";
  document.getElementById("leaderDashboard").hidden = !isLeader;
}

function renderLeaderDashboard() {
  const dashboard = document.getElementById("leaderDashboard");
  if (state.role !== "leader") {
    dashboard.innerHTML = "";
    return;
  }
  const deals = getVisibleDeals();
  const redDeals = deals.filter((item) => item.health === "red");
  const criticalRisks = deals.reduce((sum, item) => sum + item.risks.filter((risk) => risk.severity === "critical").length, 0);
  const riskAmount = redDeals.reduce((sum, item) => sum + number(item.deal[FIELD.amount]), 0);
  const managerStats = [...new Set(deals.map((item) => item.deal[FIELD.manager]))].map((manager) => {
    const managerDeals = deals.filter((item) => item.deal[FIELD.manager] === manager);
    const red = managerDeals.filter((item) => item.health === "red").length;
    return { manager, red, total: managerDeals.length };
  }).sort((a, b) => b.red - a.red || b.total - a.total);
  const focus = managerStats[0];
  dashboard.innerHTML = `
    <article class="leader-card danger"><span>Красные сделки</span><strong>${formatNumber.format(redDeals.length)}</strong><small>Требуют управленческого контроля</small></article>
    <article class="leader-card danger"><span>Критические риски</span><strong>${formatNumber.format(criticalRisks)}</strong><small>ЛПР, бюджет, ритм коммуникаций</small></article>
    <article class="leader-card"><span>Сумма под риском</span><strong>${formatRub.format(riskAmount)}</strong><small>Открытые сделки с красным здоровьем</small></article>
    <article class="leader-card"><span>Фокус менеджер</span><strong>${focus ? focus.manager : "Нет данных"}</strong><small>${focus ? `${focus.red} красных из ${focus.total} сделок` : "Нет сделок в выборке"}</small></article>
  `;
}

function render() {
  renderRoleChrome();
  renderSummary();
  renderLeaderDashboard();
  renderDealList();
  renderSelectedDeal();
}

function recalculateCurrentDeal() {
  const button = document.getElementById("recalculateButton");
  button.classList.add("is-loading");
  button.disabled = true;
  setTimeout(() => {
    state.scored = state.deals.map(scoreDeal);
    render();
    button.classList.remove("is-loading");
    button.disabled = false;
  }, 500);
}


const amountRanges = [
  { id: "lt5", label: "до 5 млн", test: (value) => value < 5000000 },
  { id: "5to10", label: "5-10 млн", test: (value) => value >= 5000000 && value < 10000000 },
  { id: "10to50", label: "10-50 млн", test: (value) => value >= 10000000 && value < 50000000 },
  { id: "gte50", label: "от 50 млн", test: (value) => value >= 50000000 }
];

function amountInRange(value, rangeId) {
  return amountRanges.find((range) => range.id === rangeId)?.test(value) || false;
}

function uniqueValues(field) {
  return [...new Set(getRoleBaseDeals().map((item) => item.deal[field]).filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), "ru"));
}

function countForOption(field, value) {
  return getRoleBaseDeals().filter((item) => item.deal[field] === value).length;
}

function selectedFilterCount() {
  return Object.values(state.filters).reduce((sum, set) => sum + set.size, 0);
}

function renderFilterPanel() {
  const config = [
    { key: "partner", label: "Партнер", field: FIELD.partner, searchable: true },
    { key: "client", label: "Клиент", field: FIELD.client, searchable: true },
    ...(state.role === "leader" ? [{ key: "manager", label: "Менеджер", field: FIELD.manager, searchable: true }] : []),
    ...(state.role === "allDeals" ? [{ key: "manager", label: "Менеджер", field: FIELD.manager, searchable: true }] : []),
    { key: "amount", label: "Сумма сделки", amount: true },
    ...(state.role === "allDeals" ? [
      { key: "stage", label: "Стадия", field: FIELD.stage, searchable: true },
      { key: "probability", label: "Вероятность", probability: true },
      { key: "critical", label: "Крит. риски", critical: true }
    ] : [])
  ];
  document.getElementById("activeFilterSummary").textContent = selectedFilterCount()
    ? `Активных фильтров: ${selectedFilterCount()}`
    : "Все сделки в выборке";
  document.getElementById("advancedFilters").innerHTML = config.map((item) => renderFilterGroup(item)).join("");
  wireFilterPanel();
}

function renderFilterGroup(item) {
  const options = item.amount
    ? amountRanges.map((range) => ({ value: range.id, label: range.label, count: getRoleBaseDeals().filter((item) => range.test(number(item.deal[FIELD.amount]))).length }))
    : item.probability
      ? [
        { value: "low", label: "до 45%", count: getRoleBaseDeals().filter((item) => probabilityInRange(item.probability, "low")).length },
        { value: "mid", label: "45-69%", count: getRoleBaseDeals().filter((item) => probabilityInRange(item.probability, "mid")).length },
        { value: "high", label: "70%+", count: getRoleBaseDeals().filter((item) => probabilityInRange(item.probability, "high")).length }
      ]
    : item.critical
      ? [
        { value: "none", label: "0 крит.", count: getRoleBaseDeals().filter((item) => criticalInRange(item.risks.filter((risk) => risk.severity === "critical").length, "none")).length },
        { value: "one", label: "1 крит.", count: getRoleBaseDeals().filter((item) => criticalInRange(item.risks.filter((risk) => risk.severity === "critical").length, "one")).length },
        { value: "many", label: "2+ крит.", count: getRoleBaseDeals().filter((item) => criticalInRange(item.risks.filter((risk) => risk.severity === "critical").length, "many")).length }
      ]
    : uniqueValues(item.field)
      .filter((value) => String(value).toLowerCase().includes((state.filterSearch[item.key] || "").toLowerCase()))
      .map((value) => ({ value, label: value, count: countForOption(item.field, value) }));
  const selectedCount = state.filters[item.key].size;
  const title = selectedCount ? `${item.label}: ${selectedCount}` : item.label;
  const alignClass = item.key === "manager" || item.key === "amount" ? " align-right" : "";
  return `
    <details class="filter-dropdown${alignClass}" data-filter-group="${item.key}" ${state.openFilter === item.key ? "open" : ""}>
      <summary>${title}</summary>
      <div class="filter-menu">
        ${item.searchable ? `<input class="filter-search" data-filter-search="${item.key}" value="${state.filterSearch[item.key] || ""}" placeholder="Найти ${item.label.toLowerCase()}">` : ""}
        <div class="option-list">
          ${options.map((option) => `
            <label class="option-row">
              <input type="checkbox" data-filter-key="${item.key}" value="${String(option.value).replaceAll('"', '&quot;')}" ${state.filters[item.key].has(option.value) ? "checked" : ""}>
              <span>${option.label}</span>
              <em class="option-count">${option.count}</em>
            </label>
          `).join("") || `<div class="empty-state">Ничего не найдено</div>`}
        </div>
      </div>
    </details>
  `;
}

function wireFilterPanel() {
  document.querySelectorAll(".filter-dropdown").forEach((details) => {
    details.addEventListener("toggle", () => {
      if (details.open) {
        const key = details.dataset.filterGroup;
        state.openFilter = key;
        document.querySelectorAll(".filter-dropdown").forEach((other) => {
          if (other !== details && other.open) other.open = false;
        });
      }
    });
  });
  document.querySelectorAll("[data-filter-key]").forEach((input) => {
    input.addEventListener("change", () => {
      const key = input.dataset.filterKey;
      state.openFilter = key;
      if (input.checked) state.filters[key].add(input.value);
      else state.filters[key].delete(input.value);
      renderFilterPanel();
      render();
    });
  });
  document.querySelectorAll("[data-filter-search]").forEach((input) => {
    input.addEventListener("input", () => {
      const key = input.dataset.filterSearch;
      state.openFilter = key;
      state.filterSearch[key] = input.value;
      renderFilterPanel();
      const nextInput = document.querySelector(`[data-filter-search="${key}"]`);
      if (nextInput) {
        nextInput.focus();
        nextInput.setSelectionRange(nextInput.value.length, nextInput.value.length);
      }
    });
  });
}

function clearAdvancedFilters() {
  Object.values(state.filters).forEach((set) => set.clear());
  Object.keys(state.filterSearch).forEach((key) => { state.filterSearch[key] = ""; });
  closeOpenFilter();
  renderFilterPanel();
  render();
}

function closeOpenFilter() {
  state.openFilter = null;
  document.querySelectorAll(".filter-dropdown[open]").forEach((details) => {
    details.open = false;
  });
}

function handleDocumentClick(event) {
  if (!event.target.closest(".filter-dropdown")) {
    closeOpenFilter();
  }
}

function switchRole(role) {
  if (role === "manager" || role === "leader") state.accessRole = role;
  state.role = role;
  state.allDealsDetailOpen = false;
  closeOpenFilter();
  if (role === "manager") state.filters.manager.clear();
  const visible = getVisibleDeals();
  state.selectedId = visible[0]?.deal[FIELD.id] || null;
  renderFilterPanel();
  render();
}

function pickDemoManager(deals) {
  const counts = new Map();
  deals.forEach((deal) => counts.set(deal[FIELD.manager], (counts.get(deal[FIELD.manager]) || 0) + 1));
  return [...counts.entries()].sort((a, b) => b[1] - a[1] || String(a[0]).localeCompare(String(b[0]), "ru"))[0]?.[0] || "";
}

function init() {
  state.deals = JSON.parse(document.getElementById("deals-data").textContent);
  state.scored = state.deals.map(scoreDeal);
  state.currentManager = pickDemoManager(state.deals);
  state.tasks = loadTasks();
  state.selectedId = getVisibleDeals()[0]?.deal[FIELD.id] || null;
  document.getElementById("searchInput").addEventListener("input", (event) => { state.search = event.target.value; render(); });
  document.getElementById("recalculateButton").addEventListener("click", recalculateCurrentDeal);
  document.querySelectorAll("[data-role]").forEach((button) => button.addEventListener("click", () => switchRole(button.dataset.role)));
  document.getElementById("taskForm").addEventListener("submit", createTaskFromForm);
  document.getElementById("taskModalClose").addEventListener("click", closeTaskModal);
  document.getElementById("taskCancelButton").addEventListener("click", closeTaskModal);
  document.getElementById("taskModal").addEventListener("click", (event) => {
    if (event.target.id === "taskModal") closeTaskModal();
  });
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeTaskModal();
      closeOpenFilter();
    }
  });
  document.addEventListener("click", handleDocumentClick);
  document.getElementById("clearFiltersButton").addEventListener("click", clearAdvancedFilters);
  document.querySelectorAll("[data-health]").forEach((button) => button.addEventListener("click", () => {
    state.health = button.dataset.health;
    document.querySelectorAll("[data-health]").forEach((chip) => chip.classList.remove("is-active"));
    button.classList.add("is-active");
    render();
  }));
  renderFilterPanel();
  render();
}

init();
</script>

</html>
