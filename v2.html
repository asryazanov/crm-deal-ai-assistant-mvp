<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI-Ассистент сделки V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-bg: #F3F6F8;
        --color-surface: #FFFFFF;
        --color-surface-soft: #F8FBFC;
        --color-border: #DCE6EA;
        --color-border-strong: #B7CDD3;
        --color-text: #0B1628;
        --color-muted: #607080;
        --color-primary: #01696f;
        --color-primary-hover: #00545A;
        --color-navy: #17264A;
        --color-navy-2: #0B1832;
        --color-cyan: #00A9E0;
        --color-teal-soft: #E7F5F5;
        --color-success: #12B76A;
        --color-success-bg: #ECFDF5;
        --color-success-text: #027A48;
        --color-warning: #F79009;
        --color-warning-bg: #FFFAEB;
        --color-warning-text: #B54708;
        --color-danger: #F04438;
        --color-danger-bg: #FEF3F2;
        --color-danger-text: #B42318;
        --radius-card: 14px;
        --radius-button: 8px;
        --shadow-card: 0 10px 30px rgba(23, 38, 74, 0.08), 0 1px 2px rgba(23, 38, 74, 0.06);
        --shadow-strong: 0 22px 46px rgba(11, 24, 50, 0.18);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(0, 169, 224, 0.09), transparent 34%),
          linear-gradient(180deg, #F7FAFB 0%, var(--color-bg) 320px);
        color: var(--color-text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app-header {
        position: sticky;
        top: 0;
        z-index: 100;
        min-height: 76px;
        background: linear-gradient(90deg, var(--color-navy-2), var(--color-navy));
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 12px 30px rgba(11, 24, 50, 0.22);
        display: flex;
        align-items: center;
      }

      .header-inner {
        width: min(1480px, calc(100% - 48px));
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .system-title {
        display: flex;
        align-items: center;
        gap: 18px;
        min-width: 0;
      }

      .brand-logo-wrap {
        display: grid;
        place-items: center;
        width: 148px;
        height: 42px;
        border-radius: 10px;
        background: #fff;
        padding: 8px 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
        flex: 0 0 auto;
      }

      .brand-logo {
        width: 124px;
        height: auto;
        display: block;
      }

      .product-name {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      .product-name span {
        color: rgba(255, 255, 255, 0.72);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .product-name strong {
        color: #fff;
        font-size: 18px;
        line-height: 1.15;
      }

      .header-meta {
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      @media (max-width: 760px) {
        .header-inner {
          width: min(100% - 24px, 1480px);
        }

        .brand-logo-wrap {
          width: 112px;
        }

        .brand-logo {
          width: 94px;
        }

        .header-meta {
          display: none;
        }
      }
    </style>
    <link rel="stylesheet" href="v2.css?v=20260619-filters1">
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="system-title">
          <div class="brand-logo-wrap">
            <img class="brand-logo" src="assets/axoft-logo.png" alt="Axoft">
          </div>
          <div class="product-name">
            <span>Внутренний сервис</span>
            <strong>AI-Ассистент сделки</strong>
          </div>
        </div>
        <div class="header-meta">V2 · управленческий cockpit</div>
      </div>
    </header>
    <main id="v2RoleDashboards" class="v2-app" aria-live="polite"></main>
    <script src="data/v2-data.js?v=20260619-filters1"></script>
    <script src="v2-app.js?v=20260619-filters1"></script>
  </body>
</html>
